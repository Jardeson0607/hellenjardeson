<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Minha Hellen</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cor-principal: #ff4d6d;
            --cor-fundo: #fff0f3;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--cor-fundo);
            color: #333;
            margin: 0;
            text-align: center;
        }

        header {
            padding: 50px 20px;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('fotoshj/capa.jpg'); /* Se tiver uma foto de capa */
            background-size: cover;
            color: white;
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; margin: 0; }

        .contador-container {
            background: white;
            margin: -30px auto 30px;
            padding: 20px;
            width: 80%;
            max-width: 500px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        #timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--cor-principal);
        }

        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .galeria img {
            width: 100%;
            border-radius: 10px;
            transition: transform 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .galeria img:hover { transform: scale(1.05); }

        footer { padding: 40px; font-size: 0.9rem; opacity: 0.7; }
    </style>
</head>
<body>

    <header>
        <h1>nós</h1>
        <p>Desde aquele momento especial...</p>
    </header>

    <div class="contador-container">
        <p>desde o nosso primeiro beijo:</p>
        <div id="timer">Calculando tempo...</div>
    </div>

    <section class="galeria">
        <img src="fotoshj/foto1.jpg" alt="Nosso momento">
        <img src="fotoshj/foto2.jpg" alt="Nosso momento">
        <img src="fotoshj/foto3.jpg" alt="Nosso momento">
    </section>

    <footer>
        <p>feito por jacim.</p>
    </footer>

    <script>
        function atualizarContador() {
            // Data do primeiro beijo: 13/12/2025 às 01:20
            const dataInicio = new Date(2025, 11, 13, 1, 20); 
            const agora = new Date();
            const diff = agora - dataInicio;

            const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutos = Math.floor((diff / 1000 / 60) % 60);
            const segundos = Math.floor((diff / 1000) % 60);

            document.getElementById('timer').innerHTML = 
                `${dias} dias, ${horas}h, ${minutos}m e ${segundos}s`;
        }

        setInterval(atualizarContador, 1000);
        atualizarContador();
    </script>
</body>
</html>
